<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Form</title>
  <link rel="stylesheet" href="styleHome.css">
  <style>
    body {
  font-family: Arial, sans-serif;
  margin: 20px;
}

form label {
  display: block;
  margin-top: 8px;
  font-weight: bold;
}

form input {
  width: 100%;
  padding: 6px;
  margin-top: 4px;
  border: 1px solid #ccc;
  border-radius: 4px;
  font-size: 14px;
}

#submit2 {
  margin-top: 12px;
  padding: 6px 12px;
  background-color: #0275d8;
  color: white;
  border: none;
  border-radius: 4px;
  font-size: 14px;
}

#search-container {
  margin: 20px 0;
  display: flex;
  gap: 10px;
}

#search {
  flex: 1;
  padding: 6px;
  border: 1px solid #ccc;
  border-radius: 4px;
  font-size: 14px;
}

#searchBtn {
  padding: 6px 12px;
  background-color: #5cb85c;
  color: white;
  border: none;
  border-radius: 4px;
  font-size: 14px;
}

#sub div {
  background-color: palevioletred;   
  color: #f5f5f5;              
  border: 2px solid #444;      
  border-radius: 8px;
  padding: 10px;
  margin: 10px 0;
  font-size: 14px;
}

#sub button {
  margin: 6px 4px 0 0;
  padding: 4px 8px;
  border: none;
  border-radius: 4px;
  font-weight: bold;
  font-size: 12px;
}

.delete-btn {
  background-color: #d9534f;
  color: white;
}

.edit-btn {
  background-color: #0275d8;
  color: white;
}

.save-btn {
  background-color: #5cb85c;
  color: white;
}

.cancel-btn {
  background-color: #f0ad4e;
  color: white;
}

  </style>
</head>
<body>
  <div>
    <form>
      <label for="name1">Job Title</label>
      <input type="text" id="name1">

      <label for="company">Company Name</label>
      <input type="text" id="company">

      <label for="location">Location</label>
      <input type="text" id="location">

      <label for="description">Job Description</label>
      <input type="text" id="description">

      <label for="mobile">Mobile Number</label>
      <input type="number" id="mobile">
    </form>
    <button id="submit2">Submit</button>
  </div>

  <div id="search-container">
    <input type="text" id="search" placeholder="Search jobs...">
    <button id="searchBtn">Search</button>
  </div>

  
  <div id="sub"></div>

  <script src="home.js"></script>
</body>
</html>
